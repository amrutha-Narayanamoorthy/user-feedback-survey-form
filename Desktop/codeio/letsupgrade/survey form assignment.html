<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> User feedback survey form</title>
    <link rel="stylesheet"href="style1.css">
</head>
<body>
    <main class="container">
        <h1 class="title">user feedback survey </h1>
        <p class="subtitle">Help us improve by sharing your experience</p>
        <form id="surveyform"novalidate>
            <div class="form-group">
                <label for="name">FullName</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="Age">Age</label>
                <input type="number"id="age" placeholder="Enter your age">
            </div>
            <div class="form-group">
                
                <label>Gender</label>
                    <input type="radio"name="Female">
                    Female
                
                
                    <input type="radio"name="Male"value="Male">
                    Male
                
                    <input type="radio"name="others">
                    others
            
            </div>
            <div class="form-group">
                
                <label>Topics of interest</label>
                    <input type="checkbox"value="html">
                    html
                
                
                    <input type="checkbox"value="CSS">
                    Css
                
                
                    <input type="checkbox"value="js">
                    js
                
            </div>
            <div class="form-group">
                <label for="feedback">Feedback/comments</label>
                <textarea id="feedback"rows="5"placeholder="Share your thoughts..."></textarea>
            </div>
           <button type="submit">Submit survey</button> 
        </form>
    
    <script src="script.js"></script>
    </main>
</body>
</html>
